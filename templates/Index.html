<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Cinema Mode</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Container for the blurred background */
  .blur-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120%;
    height: 120%;
    transform: translate(-50%, -50%);
    filter: blur(30px) brightness(0.5);
    z-index: 0;
    pointer-events: none;
  }

  /* Container for the main Twitch player */
  .player-container {
    position: relative;
    width: 90%;
    max-width: 1280px;
    aspect-ratio: 16/9;
    border-radius: 12px;
    overflow: hidden;
    z-index: 1;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Optional: fade-in effect */
  body.loaded .player-container {
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Blurred background using the same Twitch embed -->
<div class="blur-bg">
  <iframe src="https://player.twitch.tv/?channel=joenova_163&parent=blured.onrender.com&autoplay=true" allowfullscreen scrolling="no"></iframe>
</div>

<!-- Main visible Twitch player -->
<div class="player-container">
  <iframe src="https://player.twitch.tv/?channel=joenova_163&parent=blured.onrender.com&autoplay=true" allowfullscreen scrolling="no"></iframe>
</div>

<script>
  // Optional: fade in once page loads
  window.addEventListener('load', () => {
    document.body.classList.add('loaded');
  });
</script>

</body>
</html>
